<!DOCTYPE html>
<html>

<head>

<title>Rust Map Matcher</title>

<style>

body{
background:#1e1e1e;
color:white;
font-family:Arial;
text-align:center;
}

select,button{
padding:10px;
margin:10px;
}

.resultBox{
margin-top:20px;

</style>

</div>

<div>
<h3>Ferry Terminal:</h3>
<select id="ferry_terminal">
<option value="">Egal</option>

</div>

<br>
<button onclick="search()" style="padding: 15px 30px; font-size: 18px; background: #007bff; color: white; border: none; border-radius: 5px; cursor: pointer;">Map finden</button>

<div class="resultBox" id="results"></div>

<script>

async function search(){

let formData = new FormData()

// Original monuments
formData.append("launch", document.getElementById("launch").value)
formData.append("outpost", document.getElementById("outpost").value)
formData.append("airfield", document.getElementById("airfield").value)

// New monuments
formData.append("abandoned_cabins", document.getElementById("abandoned_cabins").value)
formData.append("abandoned_military_base", document.getElementById("abandoned_military_base").value)
formData.append("abandoned_supermarket", document.getElementById("abandoned_supermarket").value)
formData.append("excavator_pit", document.getElementById("excavator_pit").value)
formData.append("ferry_terminal", document.getElementById("ferry_terminal").value)
formData.append("fishing_village", document.getElementById("fishing_village").value)
formData.append("harbor", document.getElementById("harbor").value)
formData.append("hqm_quarry", document.getElementById("hqm_quarry").value)
formData.append("junkyard", document.getElementById("junkyard").value)
formData.append("arctic_research_base", document.getElementById("arctic_research_base").value)
formData.append("lighthouse", document.getElementById("lighthouse").value)
formData.append("military_tunnels", document.getElementById("military_tunnels").value)
formData.append("mining_outpost", document.getElementById("mining_outpost").value)
formData.append("missile_silo", document.getElementById("missile_silo").value)

let response = await fetch("/search",{
method:"POST",
body:formData
})

let data = await response.json()

let html=""

data.results.forEach(map=>{

html+=`

<div>

Seed: ${map.seed} <br>
Size: ${map.size} <br>
Match: ${map.match} <br>

<a href="${map.link}" target="_blank">
Map öffnen
</a>

<hr>

</div>

`

})

document.getElementById("results").innerHTML=html

}

</script>

</body>

</html>
